<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shuriken Production - Cinema Neon</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Shuri.css">
</head>
<body>

    <div class="film-grain"></div>
    <div class="vignette"></div>
    <div class="lightning" id="lightning"></div>
    <div class="ember-container" id="embers"></div>
    <div class="rain-container" id="rain"></div>

    <div class="eclipse-glow"></div>
    <div class="shuriken-frame"></div>

    <div class="logo-container" id="shuriken-logo">
        <div class="title-wrapper">
            <h1 class="shuriken-text top-slice">SHURIKEN</h1>
            <h1 class="shuriken-text bottom-slice" aria-hidden="true">SHURIKEN</h1>
            <div class="slash-flash"></div>
        </div>
        <div class="divider"></div>
        <h2 class="production-text">PRODUCTION</h2>
    </div>

    <div class="logo-container hidden" id="presents-logo">
        <div class="title-wrapper">
            <h1 class="shuriken-text top-slice">PRESENTS</h1>
            <h1 class="shuriken-text bottom-slice" aria-hidden="true">PRESENTS</h1>
            <div class="slash-flash"></div>
        </div>
    </div>

    <script src="Shuri.js"></script>
</body>
</html>
