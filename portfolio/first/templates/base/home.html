<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Movie Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/style.css?v=2">
    <link rel="icon" type="image/x-icon" href="static/images/Shuriken icon.ico">
</head>

<body>

    <div class="WinAlignment">
        <div class="site">

            <svg height="0" width="0" style="position: absolute;">
                <filter id="handDrawnNoise">
                    <feTurbulence result="noise" numOctaves="2" baseFrequency="0.1" type="fractalNoise"></feTurbulence>
                    <feDisplacementMap yChannelSelector="G" xChannelSelector="R" scale="3" in2="noise"
                        in="SourceGraphic"></feDisplacementMap>
                </filter>
            </svg>

            <div class="checkbox-stage">
                <div class="checkbox-column">

                    <label class="notebook-checkbox" data-action="terms">
                        <div class="bgTerms">
                            <img src="static/images/TermsBG.jpg" alt="bg" class="terms-bg">
                        </div>
                        <input type="checkbox">
                        <span class="text">
                            <span class="text-content">
                                Accept Terms & Conditions
                                <span class="terms-sub">
                                    <a href="terms/" target="_blank" class="inline-terms-link">READ</a>
                                </span>
                            </span>
                        </span>
                    </label>

                    <label class="notebook-checkbox" data-action="sound">
                        <div class="bgSOUND">
                            <img src="static/images/Sound BG.jpg" alt="bg" class="terms-bg">
                        </div>
                        <input type="checkbox">
                        <span class="text"><span class="text-content">Allow Sound</span></span>
                    </label>

                    <label class="notebook-checkbox" data-action="fullscreen">
                        <div class="bgFULL">
                            <img src="static/images/Full BG.jpg" alt="bg" class="terms-bg">
                        </div>
                        <input type="checkbox">
                        <span class="text"><span class="text-content">Enable Fullscreen</span></span>
                    </label>

                </div>
            </div>

            <!-- SKIP BUTTON — hidden until permission stage ends, then skips to folio -->
            <button id="skip-to-folio" onclick="skipToFolio()">
                &#9654; Skip
            </button>

            <!-- VIDEO ENTER BUTTON — hidden until video finishes one loop -->
            <button id="video-enter-btn" class="video-enter-btn">
                ENTER
            </button>

            <audio id="bgRain" src="static/images/rain.mp3" loop></audio>
            <audio id="select2Sound" src="static/images/Select_2.mp3" preload="auto"></audio>

            <div id="cinemaStage" class="cinema-stage hidden">
                <iframe id="shuri-iframe" src="static/Shuri/Shuri.html" class="cinema-item" data-type="iframe"
                    allow="autoplay; fullscreen"
                    style="display:none; background-color: black; border: none; outline: none; width: 100%; height: 100%;">
                </iframe>

                <video id="vid-hand" class="cinema-item" data-type="video" preload="auto" playsinline loop>
                    <source src="https://res.cloudinary.com/da8mnqeej/video/upload/v1777709456/Hand_pqpc8z.mp4" type="video/mp4">
                </video>

                <video id="vid-walk" class="cinema-item" data-type="video" preload="auto" playsinline>
                    <source src="https://res.cloudinary.com/da8mnqeej/video/upload/v1777625487/walk_zzaatv.mp4" type="video/mp4">
                </video>

                <iframe id="folio-iframe" data-src="static/folio/folio.html" src="about:blank"
                    class="cinema-item" data-type="iframe" allow="autoplay; fullscreen"
                    style="display:none; background-color: black; border: none; outline: none; width: 100%; height: 100%;">
                </iframe>
            </div>

        </div>
    </div>

    <script src="static/js/jave.js?v=2"></script>
</body>

</html>
